# Nav2 parameters for Spot SAR (Phase 4).
# 2D navigation in the ODOM frame, obstacles from /scan (the depth-derived laser).
#
# WHY odom-frame navigation: the control loop must NEVER depend on slam_toolbox's map->odom —
# with the narrow 67-deg scan, matching intermittently fails and the transform goes stale for
# 0.5-1 s at a time; RPP aborts the whole goal on a single failed lookup ("extrapolation into
# the future") and the robot freezes. odom->base_link comes from the Isaac bridge at ~90 Hz and
# is always fresh. Both costmaps are ROLLING with obstacles from /scan (no static /map layer),
# so nothing in the control path needs map->odom. SLAM still runs for /map + symbol grounding;
# map-framed goals (from the skills/executive) are transformed ONCE per goal by bt_navigator.
# Spot's locomotion policy subscribes to a geometry_msgs/Twist on /cmd_vel, so the controller
# must emit plain Twist (enable_stamped_cmd_vel: false). If your Nav2 build forces TwistStamped,
# add a TwistStamped->Twist relay (see spot_sar_nav notes) instead of fighting the param.
#
# NOTE: tuned conservatively for an 8 GB box + a narrow (~67 deg) forward laser. Verify/tune on
# a fresh boot — SLAM + Nav2 + Isaac together need memory headroom.

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: odom          # navigate in odom (see header); map-framed goals transform once
    robot_base_frame: base_link
    transform_tolerance: 0.5    # goal transforms tolerate slam's map->odom staleness
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    enable_stamped_cmd_vel: false          # emit geometry_msgs/Twist on /cmd_vel for Spot
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # relaxed for legged arc-turning: with rotate_to_heading off (the policy cannot turn
      # in place) a goal behind the robot needs a wide arc, and near walls the regulated
      # 0.35 m/s floor makes honest progress ~0.3-0.4 m per 10 s — the old 0.5 m / 10 s
      # tripped false "Failed to make progress" aborts mid-arc. Real stalls are gone with
      # the standing-attractor fix, so the looser gate stays safe.
      required_movement_radius: 0.3
      movement_time_allowance: 15.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35   # approach arrives at >= 0.35 m/s (policy walk floor) — needs margin
      yaw_goal_tolerance: 6.28  # heading-agnostic: pure in-place rotation is the policy's OTHER
      #                           weak regime (commanded wz-only it CREEPS diagonally instead of
      #                           turning — observed drifting 7 m into a corner). Frontier goals
      #                           have arbitrary orientation; never demand a final yaw.
      stateful: true
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # SPEEDS MUST STAY IN THE POLICY'S WALK REGIME. The flat-terrain policy was trained with
      # lin_vel_x in [-2, 3] m/s and 10% standing envs (spot_env.yaml rel_standing_envs) — it
      # has a deliberate "stand still" attractor that swallows commands around <=0.3 m/s from
      # standstill: cmd 0.25 measured 0.000 m displacement, joints static, while wz 0.8 walks
      # fine. The old 0.3 slow-gait (denser tilt-gated camera scans) is obsolete with the
      # stabilized lidar; every floor below keeps commanded speed >= ~0.35.
      desired_linear_vel: 0.6
      max_linear_accel: 1.0
      max_linear_decel: 1.0
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      rotate_to_heading_angular_vel: 0.8
      # 0.5 (was 0.2): slam_toolbox refreshes map->odom per scan-match, so at the 20 Hz control
      # rate lookups can be ~0.1-0.3 s stale -> "extrapolation into the future" aborts mid-path.
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.35   # never command sub-walkable speeds on goal approach
      approach_velocity_scaling_dist: 0.6
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.35  # curvature slowdown floor stays walkable
      max_angular_accel: 2.0
      max_robot_pose_search_dist: 10.0
      # OFF: rotate-to-heading commands pure wz, which this policy tracks terribly (it creeps
      # sideways instead of turning in place — measured minutes of vx=0 rotation drifting the
      # robot 7 m off-path into a corner). With it off RPP always walks (vx >= the 0.35 floor)
      # with curvature-limited wz — the regime the policy tracks well.
      use_rotate_to_heading: false
      allow_reversing: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      transform_tolerance: 0.5
      update_frequency: 5.0
      publish_frequency: 2.0
      width: 6
      height: 6
      resolution: 0.05
      rolling_window: true
      footprint: "[ [0.45, 0.20], [0.45, -0.20], [-0.45, -0.20], [-0.45, 0.20] ]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          inf_is_valid: true        # inf misses (REP-117) raytrace-clear to range_max: the
          #                           costmap carries the "explored free space" signal that
          #                           karto's /map cannot (it only carves along hit rays)
          raytrace_max_range: 5.0   # = lidar RANGE_MAX
          obstacle_max_range: 4.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom        # rolling costmap; odom keeps planning independent of SLAM latency
      robot_base_frame: base_link
      transform_tolerance: 0.5
      update_frequency: 1.0
      publish_frequency: 1.0
      always_send_full_costmap: true   # frontier_explorer consumes the full grid at 1 Hz
      # 0.1, not 0.05: at 40x40 m this is 160k cells vs 640k — planning-scale is enough here
      # (the 0.05 local costmap does tight avoidance), and 640k cells caused transient
      # "Costmap timed out waiting for update" planner failures at 1 Hz full publishes.
      resolution: 0.1
      # ROLLING, robot-centred global costmap (NOT bound to slam_toolbox's partial /map). With a
      # static map the planner aborts "Robot is out of bounds of the costmap" whenever the robot
      # sits just outside the small explored map. A 40x40 m rolling window keeps the robot always
      # in-bounds AND covers the whole 20 m single room from anywhere inside it (a frontier on the
      # far wall can be ~19 m away per axis; goals outside the window are unplannable); obstacles
      # come live from /scan, and NavfnPlanner(allow_unknown) plans through the unmapped cells.
      # The persistent map still lives in slam /map + the symbolic world model.
      rolling_window: true
      width: 40
      height: 40
      track_unknown_space: true
      footprint: "[ [0.45, 0.20], [0.45, -0.20], [-0.45, -0.20], [-0.45, 0.20] ]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          inf_is_valid: true        # inf misses (REP-117) raytrace-clear to range_max: the
          #                           costmap carries the "explored free space" signal that
          #                           karto's /map cannot (it only carves along hit rays)
          raytrace_max_range: 5.0   # = lidar RANGE_MAX
          obstacle_max_range: 4.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 10.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.6, 0.0, 1.0]
    min_velocity: [-0.6, 0.0, -1.0]
    max_accel: [1.0, 0.0, 2.0]
    max_decel: [-1.0, 0.0, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1
