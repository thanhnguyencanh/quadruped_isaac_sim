# slam_toolbox (async mapping) for Spot SAR — Phase 3.
# Consumes /scan (synthesized from the RGB-D depth image by depthimage_to_laserscan,
# published in the horizontal camera_link frame) + the odom->base_link TF from the Isaac
# bridge, and produces /map plus the map->odom transform.
#
# NOTE: the depth-camera scan is a narrow forward FOV (~67 deg), so this is a modest first
# mapping cut — enough to close the SENSE->...->MAP loop. A wider sensor (RTX LiDAR) is the
# upgrade path once the 8 GB VRAM budget allows.
slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # frames + topic
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    # solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # rates / ranges
    transform_publish_period: 0.02
    map_update_interval: 1.0
    resolution: 0.05
    min_laser_range: 0.3
    max_laser_range: 5.0   # = lidar RANGE_MAX / scan range_max (karto rangeThreshold; kept
    #                        < room size for exploration). Misses are inf (REP-117) — NEVER
    #                        republish them as finite values: karto's matcher uses UNFILTERED
    #                        readings and a finite miss ring is rotation-invariant, collapsing
    #                        every scan pose onto the previous one (map became a 5 m disc that
    #                        followed the robot). Karto ignores inf: no clearing on misses —
    #                        the "explored free space" signal lives in the nav2 costmaps
    #                        (inf_is_valid: true), which the frontier explorer reads.
    minimum_time_interval: 0.2
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false

    # scan matching — process scans even while STATIONARY (travel gates 0; rate-limited by
    # minimum_time_interval). With travel gates > 0 the map->odom stamp FREEZES whenever the
    # robot stands still; sim time runs past it and every Nav2 controller lookup dies with
    # "extrapolation into the future" -> goals abort before Spot can start moving (deadlock:
    # slam waits for motion, motion waits for slam).
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Trust ODOMETRY strongly: Isaac's odom is near ground truth in sim, while the narrow 67-deg
    # scan against featureless walls gives weak correlation — with stationary matching enabled
    # (travel gates 0) an unconstrained matcher slowly WANDERS and visibly rotates the map.
    # Higher penalties pin matches to the odom prior and suppress that drift.
    distance_variance_penalty: 1.5
    angle_variance_penalty: 3.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
